version: "3.8"

services:
  mongodb:
    image: mongo:7.0
    container_name: labirinto-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongodb_data:/data/db
    networks:
      - labirinto-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  mongo-init:
    image: mongo:7.0
    container_name: labirinto-mongo-init
    restart: "no"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - labirinto-network
    entrypoint: >
      mongosh --host mongodb:27017 --eval
      "try { rs.status() } catch(e) { rs.initiate({_id:'rs0', members:[{_id:0, host:'mongodb:27017'}]}) }"


volumes:
  mongodb_data:
    driver: local

networks:
  labirinto-network:
    driver: bridge
