name: CD Node.js Labirinto do Saber
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/labirinto-do-saber:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/labirinto-do-saber:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/labirinto-do-saber:latest
      - name: Publish Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/labirinto-do-saber:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/labirinto-do-saber:latest
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ${{ secrets.EC2_APP_PATH }}
            docker-compose -f docker-compose.ec2.yml down
            docker pull ${{ secrets.DOCKER_USERNAME }}/labirinto-do-saber:latest
            docker-compose -f docker-compose.ec2.yml up -d